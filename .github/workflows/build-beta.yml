name: "Build Beta App"

on:
  push:
    branches:
      - master
  workflow_dispatch: # 允许手动触发

jobs:
  build-tauri:
    environment: build-beta
    env:
      SRC_DIR: "beta/src-repo"

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target-args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            target-args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            target-args: ""
          - platform: "windows-latest"
            target-args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Build Repo
        uses: actions/checkout@v4

      # 2. 新增步骤：通配符寻找 ZIP 文件并截取解析其中的 SHA
      - name: Determine ZIP file and SHA
        shell: bash
        run: |
          # 寻找 beta/目录下类似 source_$hash.zip 的文件 (拿第一个匹配项)
          ZIP_PATH=$(ls beta/source_*.zip | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "❌ 未找到符合 beta/source_*.zip 的文件"
            exit 1
          fi
          echo "✅ 找到源码包: $ZIP_PATH"

          # 提取文件名 (例如: source_abcd123.zip)
          ZIP_NAME=$(basename "$ZIP_PATH")

          # bash 字符串截取: 掐头去尾提取 hash
          SHA_VAL=${ZIP_NAME#source_} # 移除 "source_" 前缀
          SHA_VAL=${SHA_VAL%.zip}     # 移除 ".zip" 后缀

          echo "✅ 解析到的 SHA: $SHA_VAL"

          # 写入环境变量供后续 Step 使用
          echo "ZIP_FILE=$ZIP_PATH" >> $GITHUB_ENV
          echo "UPLOAD_SHA=$SHA_VAL" >> $GITHUB_ENV

      # 3. 解压源码包 (直接使用动态解析的 env.ZIP_FILE)
      - name: Extract Source Code
        shell: bash
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          unzip -P "$ZIP_PASSWORD" -q "${{ env.ZIP_FILE }}" -d "${{ env.SRC_DIR }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Monorepo Dependencies
        working-directory: ${{ env.SRC_DIR }}
        run: npm install

      - name: Build Tauri (Beta)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "${{ env.SRC_DIR }}/apps/app"
          tauriScript: npx tauri
          args: ${{ matrix.target-args }} --config src-tauri/tauri.beta.json --features beta

      - name: Install Action Script Dependencies
        working-directory: ${{ env.SRC_DIR }}/.github
        run: npm install

      # 4. 将解析出的 UPLOAD_SHA 传递给上传脚本
      - name: Upload Artifacts
        working-directory: ${{ env.SRC_DIR }}/.github
        env:
          FILES_API_PREFIX: ${{ secrets.FILES_API_PREFIX }}
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
        # 注意: npm run 传命令行参数给底层脚本时，必须用 `--` 隔开
        run: npm run upload -- --dir public/release/beta/${{ env.UPLOAD_SHA }}
